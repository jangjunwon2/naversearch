name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────
  # Job 1: 클라우드에서 프론트엔드 빌드 (RAM 제한 없음)
  # ─────────────────────────────────────────────────
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    outputs:
      frontend_changed: ${{ steps.detect.outputs.changed }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2          # 직전 커밋과 비교하기 위해 2개만

      # frontend/ 아래 파일이 바뀌었는지 감지
      # 첫 커밋(이전 커밋 없음)이면 항상 빌드
      - name: Detect frontend changes
        id: detect
        run: |
          TOTAL=$(git rev-list --count HEAD)
          if [ "$TOTAL" -le "1" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif git diff --name-only HEAD~1 HEAD | grep -q '^frontend/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.detect.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        if: steps.detect.outputs.changed == 'true'
        run: cd frontend && npm ci && npm run build

      # dist 폴더를 아티팩트로 저장 → deploy job이 내려받음
      - name: Upload dist artifact
        if: steps.detect.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1       # 1일 후 자동 삭제

  # ─────────────────────────────────────────────────
  # Job 2: 라즈베리파이에서 배포 (self-hosted runner)
  # ─────────────────────────────────────────────────
  deploy:
    name: Deploy to Raspberry Pi
    needs: build
    runs-on: [self-hosted, raspberry-pi]

    steps:
      # Pi 워크스페이스에 최신 코드 동기화
      # clean: false → .env, backend/store/*.json 등 런타임 파일 보존
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          clean: false

      # 클라우드에서 빌드한 dist를 내려받아 덮어씀
      - name: Download frontend dist
        if: needs.build.outputs.frontend_changed == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      # 백엔드 의존성 설치 (devDependencies 제외)
      - name: Install backend dependencies
        run: npm install --omit=dev

      # PM2로 재시작 (없으면 최초 기동)
      - name: Restart service
        run: |
          if pm2 id naverrank > /dev/null 2>&1; then
            pm2 restart naverrank --update-env
          else
            pm2 start backend/server.js \
              --name naverrank \
              --env production
          fi
          pm2 save

      - name: Show status
        run: pm2 list
